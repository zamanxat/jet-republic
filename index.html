<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JET Republic — Маңызды сілтемелер</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f2;
            --card: #ffffff;
            --primary: #0d4d2b;
            --primary-light: #166534;
            --primary-soft: #dcfce7;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --radius-sm: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-hover: 0 12px 28px rgba(13,77,43,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .logo-section {
            margin-top: 56px;
            text-align: center;
        }
        .logo-circle {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--primary) 0%, var(--primary-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(13,77,43,0.25);
        }
        .logo-circle span {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }
        .company-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 44px 0 18px;
            text-align: left;
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
        }
        .link-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: var(--text);
            transition: box-shadow .25s ease, transform .25s ease, border-color .25s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }
        .link-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-4px); border-color: var(--primary-soft); }
        .link-card:active { transform: translateY(-2px); }
        @media (hover: none) { .link-card:hover { transform: none; } .link-card:active { transform: scale(0.98); } }
        .card-preview {
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(160deg, var(--primary-soft) 0%, #f0fdf4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .card-preview svg {
            width: 48px;
            height: 48px;
            color: var(--primary);
            opacity: 0.9;
        }
        .card-label {
            padding: 16px 18px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15,23,42,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--card);
            border-radius: 20px;
            padding: 40px 32px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0,0,0,0.15);
            border: 1px solid var(--border);
        }
        .modal-box h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: var(--text); }
        .modal-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
        .modal-box input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 16px; /* 16px+ prevents iOS zoom on focus */
            outline: none;
            transition: border-color .2s;
            text-align: center;
            letter-spacing: 2px;
            font-family: inherit;
        }
        .modal-box input:focus { border-color: var(--primary); }
        .modal-box .modal-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(145deg, var(--primary), var(--primary-light));
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity .2s, transform .05s;
            font-family: inherit;
        }
        .modal-box .modal-btn:hover { opacity: 0.95; }
        .modal-box .modal-btn.secondary {
            background: var(--bg);
            color: var(--text);
            margin-top: 10px;
        }
        .modal-box .modal-btn.secondary:hover { background: var(--border); }
        .modal-error { color: #dc2626; font-size: 13px; margin-top: 12px; display: none; font-weight: 600; }

        /* ——— Толық адаптивті ——— */
        @media (max-width: 480px) {
            .logo-section { margin-top: 32px; }
            .logo-circle { width: 72px; height: 72px; }
            .logo-circle span { font-size: 22px; }
            .company-name { font-size: 18px; }
            .section-title { padding: 0 16px; margin: 36px 0 14px; font-size: 10px; }
            .cards-grid { gap: 12px; padding: 0 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
            .card-label { font-size: 13px; padding: 14px 12px; }
            .card-preview svg { width: 38px; height: 38px; }
            .modal-box { padding: 28px 20px; width: calc(100% - 32px); margin: 16px; border-radius: 18px; }
            .modal-box .modal-btn, .modal-box .modal-btn.secondary { min-height: 48px; }
        }
        @media (max-width: 360px) {
            .cards-grid { grid-template-columns: 1fr; gap: 10px; padding: 0 12px; }
            .card-label { padding: 12px 14px; font-size: 12px; }
        }
        @media (min-width: 768px) {
            .cards-grid { max-width: 480px; gap: 20px; }
            .logo-section { margin-top: 64px; }
        }
    </style>
</head>
<body>
    <div class="logo-section">
        <div class="logo-circle"><span>JR</span></div>
        <div class="company-name">JET Republic</div>
    </div>

    <div class="section-title">Маңызды сілтемелер</div>

    <div class="cards-grid">
        <a href="manager.html" class="link-card">
            <div class="card-preview">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="13" y2="12"/><line x1="7" y1="16" x2="15" y2="16"/></svg>
            </div>
            <div class="card-label">Тапсырыс қосу</div>
        </a>
        <div class="link-card" onclick="openAdminAuth()">
            <div class="card-preview">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="10" r="3"/><path d="M6 20c0-3 3-5 6-5s6 2 6 5"/></svg>
            </div>
            <div class="card-label">Админ панель</div>
        </div>
        <a href="logistics.html" class="link-card">
            <div class="card-preview">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="15" height="12" rx="2"/><path d="M16 10h4l3 4v4h-7V10z"/><circle cx="7" cy="20" r="2"/><circle cx="20" cy="20" r="2"/></svg>
            </div>
            <div class="card-label">Логистика</div>
        </a>
        <!-- <a href="manager.html" class="link-card">
            <div class="card-preview">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <div class="card-label">Тапсырыстар тізімі</div>
        </a> -->
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-box">
            <h3>Админ панель</h3>
            <p>Кіру үшін парольді енгізіңіз</p>
            <input type="password" id="adminPassword" placeholder="Пароль" autocomplete="off">
            <div class="modal-error" id="authError">Пароль дұрыс емес</div>
            <button class="modal-btn" onclick="checkAdminPassword()">Кіру</button>
            <button class="modal-btn secondary" onclick="closeAuthModal()">Бас тарту</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jnuokhhqojlurvadcduv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_3l9NjY0Qadv3dJ9x3-t19w_8mKniZBk';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function openAdminAuth(){
            if(localStorage.getItem('eskhat_admin_auth') === 'true'){
                window.location.href = 'admin.html';
                return;
            }
            document.getElementById('authModal').classList.add('active');
            document.getElementById('adminPassword').focus();
        }
        function closeAuthModal(){
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('adminPassword').value = '';
            document.getElementById('authError').style.display = 'none';
        }
        async function checkAdminPassword(){
            const pw = document.getElementById('adminPassword').value;
            const {data} = await sb.from('eseke-settings').select('setting_value').eq('setting_key','admin_password').single();
            const correctPw = data?.setting_value || '123456';
            if(pw === correctPw){
                localStorage.setItem('eskhat_admin_auth','true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('authError').style.display = 'block';
            }
        }
        document.getElementById('adminPassword').addEventListener('keydown', e=>{if(e.key==='Enter')checkAdminPassword()});
    </script>
</body>
</html>
