<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JET Republic — Логистика</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#f0f4f2;--card:#fff;--primary:#0d4d2b;--primary-light:#166534;--text:#0f172a;--text-muted:#64748b;--border:#e2e8f0;--radius:16px;--radius-sm:12px;--shadow:0 1px 3px rgba(0,0,0,0.06)}
        *{margin:0;padding:0;box-sizing:border-box}
        html{-webkit-text-size-adjust:100%}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);padding-bottom:env(safe-area-inset-bottom)}
        .top-bar{display:flex;align-items:center;padding:16px 20px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
        .top-bar .back-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:var(--bg);border-radius:var(--radius-sm);cursor:pointer;margin-right:12px;text-decoration:none;transition:background .2s}
        .top-bar .back-btn:hover{background:var(--border)}
        .top-bar .back-btn svg{width:20px;height:20px;color:var(--text)}
        .top-bar .title{font-size:18px;font-weight:800;color:var(--primary);letter-spacing:-0.02em}
        .container{max-width:700px;margin:0 auto;padding:24px 20px 80px}
        .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
        .filters select,.filters input{padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;background:var(--card);outline:none}
        .filters select:focus,.filters input:focus{border-color:var(--primary)}
        .filters button{padding:12px 18px;min-height:48px;background:linear-gradient(145deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
        .btn-ico{width:16px;height:16px;opacity:0.95}

        .order-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);border-left:4px solid var(--border);border:1px solid var(--border);border-left-width:4px}
        .order-card.status-new{border-left-color:#3b82f6}
        .order-card.status-processing{border-left-color:#f59e0b}
        .order-card.status-shipped{border-left-color:#22c55e}
        .order-card.status-delivered{border-left-color:var(--primary)}
        .order-card.status-cancelled{border-left-color:#dc2626}
        .order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .order-id{font-size:12px;color:var(--text-muted);font-weight:600}
        .order-status{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
        .s-new{background:#dbeafe;color:#1d4ed8}
        .s-processing{background:#fef3c7;color:#b45309}
        .s-shipped{background:#dcfce7;color:#15803d}
        .s-delivered{background:#dcfce7;color:var(--primary)}
        .s-cancelled{background:#fee2e2;color:#b91c1c}
        .order-client{font-size:16px;font-weight:700;margin-bottom:2px}
        .order-phone{font-size:14px;color:var(--text-muted);margin-bottom:6px}
        .order-detail{font-size:13px;color:var(--text-muted);margin-bottom:2px}
        .order-detail span{color:var(--text);font-weight:500}
        .order-addr{font-size:13px;color:var(--primary);font-weight:600;margin-bottom:8px}
        .edit-logistics-btn{padding:10px 18px;background:var(--bg);border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;color:var(--text);margin-top:12px;transition:all .2s;font-family:inherit}
        .edit-logistics-btn:hover{background:var(--border);border-color:var(--primary);color:var(--primary)}

        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,0.5);z-index:1000;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
        .modal-overlay.active{display:flex}
        .modal-sheet{background:var(--card);width:100%;max-width:600px;border-radius:20px 20px 0 0;padding:32px 24px 48px;max-height:85vh;overflow-y:auto;border:1px solid var(--border)}
        .modal-sheet h3{font-size:20px;font-weight:800;margin-bottom:24px;text-align:center;color:var(--text)}
        .modal-sheet .field{margin-bottom:16px}
        .modal-sheet label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
        .modal-sheet select,.modal-sheet input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;outline:none}
        .modal-sheet select:focus,.modal-sheet input:focus{border-color:var(--primary)}
        .extra-field{display:none}
        .extra-field.visible{display:block}
        .modal-actions{display:flex;gap:12px;margin-top:24px}
        .modal-actions button{flex:1;padding:16px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
        .btn-cancel{background:var(--bg);color:var(--text);border:2px solid var(--border)}
        .btn-save{background:linear-gradient(145deg,var(--primary),var(--primary-light));color:#fff}

        .empty-state{text-align:center;padding:64px 24px;color:var(--text-muted);font-size:15px;font-weight:500}

        .toast-wrap{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:9999;max-width:calc(100% - 32px);width:320px}
        .toast{padding:14px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.12);display:inline-flex;align-items:center;gap:10px;animation:toastIn .3s ease}
        .toast-ok{background:linear-gradient(145deg,var(--primary),var(--primary-light));color:#fff}
        .toast-err{background:#dc2626;color:#fff}
        @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        /* ——— Толық адаптивті ——— */
        @media(max-width:768px){
            .container{max-width:100%;padding:20px 16px 80px;padding-bottom:max(80px,env(safe-area-inset-bottom)+60px)}
            .top-bar{padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top))}
            .top-bar .title{font-size:16px}
            .filters{flex-wrap:wrap;gap:8px}
            .filters select,.filters input{flex:1 1 120px;min-width:0}
            .order-card{padding:16px}
            .edit-logistics-btn{min-height:48px;width:100%}
            .modal-sheet{padding:28px 20px 44px;padding-bottom:max(44px,env(safe-area-inset-bottom)+24px)}
            .modal-actions button{min-height:48px}
        }
        @media(max-width:480px){
            .container{padding:16px 12px 72px}
            .top-bar .back-btn{width:44px;height:44px}
            .filters select,.filters input{flex:1 1 100%}
            .order-client{font-size:15px}
            .order-addr{font-size:12px}
        }
        @media(min-width:600px){
            .modal-overlay{align-items:center}
            .modal-sheet{border-radius:20px;max-height:80vh}
        }
    </style>
</head>
<body>
    <div class="toast-wrap" id="toastWrap"></div>
    <div class="top-bar">
        <a href="index.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
        <div class="title">Логистика</div>
    </div>

    <div class="container">
        <div class="filters">
            <select id="filterStatus">
                <option value="">Барлық статустар</option>
                <option value="new">Жаңа</option>
                <option value="processing">Өңделуде</option>
                <option value="shipped">Жіберілді</option>
                <option value="delivered">Жеткізілді</option>
            </select>
            <select id="filterDeliveryType"><option value="">Жеткізу түрі</option></select>
            <input type="date" id="filterDateFrom">
            <input type="date" id="filterDateTo">
            <button onclick="loadOrders()"><svg class="btn-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg> Фильтрлеу</button>
        </div>
        <div id="ordersList"><div class="empty-state">Жүктелуде...</div></div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-sheet">
            <h3>Жеткізу ақпаратын өзгерту</h3>
            <input type="hidden" id="editId">
            <div class="field">
                <label>Статус</label>
                <select id="editStatus">
                    <option value="new">Жаңа</option>
                    <option value="processing">Өңделуде</option>
                    <option value="shipped">Жіберілді</option>
                    <option value="delivered">Жеткізілді</option>
                    <option value="cancelled">Бас тартылды</option>
                </select>
            </div>
            <div class="field">
                <label>Жеткізу түрі</label>
                <select id="editDeliveryType" onchange="updateExtraField()"></select>
            </div>
            <div class="field extra-field" id="extraFieldGroup">
                <label id="extraFieldLabel">Қосымша ақпарат</label>
                <input type="text" id="editExtraValue">
            </div>
            <div class="field">
                <label>Жіберілген күні</label>
                <input type="date" id="editShippedDate">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Бас тарту</button>
                <button class="btn-save" onclick="saveLogistics()">Сақтау</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL='https://jnuokhhqojlurvadcduv.supabase.co';
        const SUPABASE_KEY='sb_publishable_3l9NjY0Qadv3dJ9x3-t19w_8mKniZBk';
        const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

        function showToast(msg,type){
            type=type||'ok';
            const wrap=document.getElementById('toastWrap');
            const el=document.createElement('div');
            el.className='toast toast-'+(type==='err'?'err':'ok');
            el.textContent=msg;
            wrap.appendChild(el);
            setTimeout(function(){el.style.animation='toastIn .25s ease reverse';setTimeout(function(){el.remove()},260)},2800);
        }

        let deliveryTypes=[];

        async function loadDeliveryTypes(){
            const {data}=await sb.from('eseke-delivery-types').select('*').eq('active',true);
            deliveryTypes=data||[];
            const f=document.getElementById('filterDeliveryType');
            const e=document.getElementById('editDeliveryType');
            e.innerHTML='<option value="">— таңдаңыз —</option>';
            deliveryTypes.forEach(dt=>{
                f.innerHTML+=`<option value="${dt.id}">${dt.name}</option>`;
                e.innerHTML+=`<option value="${dt.id}" data-extra="${dt.extra_field_name||''}">${dt.name}</option>`;
            });
        }

        function updateExtraField(){
            const sel=document.getElementById('editDeliveryType');
            const opt=sel.options[sel.selectedIndex];
            const extra=opt?.dataset?.extra;
            const g=document.getElementById('extraFieldGroup');
            const l=document.getElementById('extraFieldLabel');
            if(extra){
                g.classList.add('visible');
                l.textContent=extra;
                document.getElementById('editExtraValue').placeholder=extra+' енгізіңіз';
            }else{
                g.classList.remove('visible');
            }
        }

        async function loadOrders(){
            const status=document.getElementById('filterStatus').value;
            const dtype=document.getElementById('filterDeliveryType').value;
            const from=document.getElementById('filterDateFrom').value;
            const to=document.getElementById('filterDateTo').value;

            let q=sb.from('eseke-orders').select('*, eseke-managers(name), eseke-delivery-types(name, extra_field_name), eseke-payment-types(name)').order('created_at',{ascending:false}).limit(200);
            if(status) q=q.eq('status',status);
            if(dtype) q=q.eq('delivery_type_id',parseInt(dtype));
            if(from) q=q.gte('created_at',from+'T00:00:00');
            if(to) q=q.lte('created_at',to+'T23:59:59');

            const {data:orders}=await q;
            const list=document.getElementById('ordersList');
            if(!orders||orders.length===0){
                list.innerHTML='<div class="empty-state">Тапсырыстар табылмады</div>';
                return;
            }
            const sText={new:'Жаңа',processing:'Өңделуде',shipped:'Жіберілді',delivered:'Жеткізілді',cancelled:'Бас тартылды'};
            const sCls={new:'s-new',processing:'s-processing',shipped:'s-shipped',delivered:'s-delivered',cancelled:'s-cancelled'};

            list.innerHTML=orders.map(o=>{
                const mName=o['eseke-managers']?.name||'-';
                const dName=o['eseke-delivery-types']?.name||'-';
                const extraLabel=o['eseke-delivery-types']?.extra_field_name||'';
                return `
                <div class="order-card status-${o.status}">
                    <div class="order-top">
                        <span class="order-id">#${o.id} • ${mName}</span>
                        <span class="order-status ${sCls[o.status]}">${sText[o.status]}</span>
                    </div>
                    <div class="order-client">${o.customer_name}</div>
                    <div class="order-phone">${o.customer_phone||''}</div>
                    ${o.customer_address?`<div class="order-addr">${o.customer_address}</div>`:''}
                    <div class="order-detail">Жеткізу: <span>${dName}</span></div>
                    ${o.delivery_extra_value?`<div class="order-detail">${extraLabel}: <span>${o.delivery_extra_value}</span></div>`:''}
                    ${o.shipped_date?`<div class="order-detail">Жіберілген: <span>${o.shipped_date}</span></div>`:''}
                    <div class="order-detail">Бағасы: <span>${Number(o.total_price||0).toLocaleString()} ₸</span></div>
                    <button class="edit-logistics-btn" onclick='openEditModal(${JSON.stringify({id:o.id,status:o.status,delivery_type_id:o.delivery_type_id,delivery_extra_value:o.delivery_extra_value||"",shipped_date:o.shipped_date||""})})'>Жеткізуді өзгерту</button>
                </div>`;
            }).join('');
        }

        function openEditModal(o){
            document.getElementById('editId').value=o.id;
            document.getElementById('editStatus').value=o.status;
            document.getElementById('editDeliveryType').value=o.delivery_type_id||'';
            document.getElementById('editExtraValue').value=o.delivery_extra_value||'';
            document.getElementById('editShippedDate').value=o.shipped_date||'';
            updateExtraField();
            document.getElementById('editModal').classList.add('active');
        }
        function closeModal(){document.getElementById('editModal').classList.remove('active')}

        async function saveLogistics(){
            const id=parseInt(document.getElementById('editId').value);
            const update={
                status:document.getElementById('editStatus').value,
                delivery_type_id:document.getElementById('editDeliveryType').value?parseInt(document.getElementById('editDeliveryType').value):null,
                delivery_extra_value:document.getElementById('editExtraValue').value||null,
                shipped_date:document.getElementById('editShippedDate').value||null
            };
            const {error}=await sb.from('eseke-orders').update(update).eq('id',id);
            if(error){showToast('Қате: '+error.message,'err');return}
            showToast('Сақталды');
            closeModal();
            loadOrders();
        }

        // Close modal on overlay click
        document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeModal()});

        loadDeliveryTypes();
        loadOrders();
    </script>
</body>
</html>
